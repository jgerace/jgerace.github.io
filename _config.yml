title: John Gerace
subtitle: "A writer and designer with a weakness for long margin notes and short deadlines"
description: "Irregular dispatches on design, typography, and the quiet disasters of making things."

# SEO — used by jekyll-seo-tag
# Set author twitter/mastodon for social meta tags
twitter:
  username: yourtwitterhandle   # omit @ sign, or remove if not on Twitter

# Default social sharing image — create a 1200x630px image and put it in assets/
# logo: /assets/images/social-card.png

# Mastodon verification link (rel=me)
# Add your Mastodon profile URL to links: in _config.yml — the rel="me" is already set
url: "https://eleanormarsh.com"
baseurl: ""

author:
  name: John Gerace
  email: hello@eleanormarsh.com

# Volume / issue — update each year
journal:
  # volume: "Vol. III"
  since: "Est. 2024"
  tagline: "Irregular Dispatches on Matters of Mild Consequence"

# Hire block — set to false to hide
hiring: true
hiring_text: "Available for freelance work — design systems, typographic direction, and front-end implementation."
hiring_link_text: "Get in touch →"
hiring_link: "/contact/"

# Paginate
paginate: 10
paginate_path: "/writing/page:num/"

# Collections
collections:
  projects:
    output: false

# Default front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: John Gerace
  - scope:
      path: ""
      type: projects
    values: {}

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-redirect-from

# Feed
feed:
  path: feed.xml

# Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  footnote_start: 1
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Permalinks
permalink: /writing/:year/:month/:slug/

# Homepage
home_post_count: 5   # number of recent posts shown on the homepage

# Analytics (GoatCounter)
# Set your GoatCounter username to enable analytics.
# Leave blank or remove to disable.
goatcounter: ""

# Social / elsewhere links
# The `icon` field must match a filename in _includes/icons/
links:
  - platform: github
    url: https://github.com/jgerace
    handle: "@jgerace"
    note: "code, mostly half-finished"
    icon: github
  - platform: linkedin
    url: https://linkedin.com/in/john.gerace
    handle: "john.gerace"
    note: "the professional one. I maintain it, reluctantly"
    icon: linkedin
  - platform: medium
    url: https://medium.com/@johngerace
    handle: "@johngerace"
    note: "scribbles, syndicated from this site"
    icon: medium
  - platform: rss
    url: /feed.xml
    handle: "feed.xml"
    note: "subscribe in your reader of choice"
    icon: rss

# Include future-dated posts
future: true

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
