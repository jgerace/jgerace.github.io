<a href="#main-content" class="skip-link">Skip to content</a>

<header class="masthead">
  <div class="masthead__volume">
    {{ site.journal.volume }} · {{ site.journal.since }} · {{ site.journal.tagline }}
  </div>
  <a href="{{ '/' | relative_url }}" style="text-decoration:none" aria-label="{{ site.title }} — home">
    {% if page.layout == 'home' %}
    <h1 class="masthead__name">{{ site.title }}</h1>
    {% else %}
    <p class="masthead__name">{{ site.title }}</p>
    {% endif %}
  </a>
  <p class="masthead__subtitle">{{ site.subtitle }}</p>
  <nav class="masthead__nav" aria-label="Site navigation">
    <a href="{{ '/writing/' | relative_url }}"
      {% if page.url contains '/writing' or page.layout == 'post' %}class="nav-current" aria-current="page"{% endif %}>
      writing
    </a>
    <a href="{{ '/projects/' | relative_url }}"
      {% if page.url contains '/projects' %}class="nav-current" aria-current="page"{% endif %}>
      projects
    </a>
    <a href="{{ '/elsewhere/' | relative_url }}"
      {% if page.url contains '/elsewhere' %}class="nav-current" aria-current="page"{% endif %}>
      elsewhere
    </a>
  </nav>
</header>
